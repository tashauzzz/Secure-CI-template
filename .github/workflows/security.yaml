name: security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '43 22 * * *'

permissions:
  contents: read

jobs:
  static:
    name: Static
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Bootstrap host-side tools
        run: ./scripts/01_host_tools_bootstrap.sh tools

      - name: Run Bandit
        run: ./scripts/05_sast_bandit.sh

      - name: Run pip-audit
        run: ./scripts/06_sca_pip_audit.sh

      - name: Run CycloneDX SBOM
        run: ./scripts/07_sbom_cyclonedx.sh

      - name: Upload static reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: static-reports
          path: |
            reports/bandit.json
            reports/pip-audit-app.json
            reports/pip-audit-dev.json
            reports/sbom.cdx.json
          if-no-files-found: warn
          retention-days: 3

  image-security:
    name: Image security
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    needs: static
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Bootstrap CI env
        run: ./scripts/00_env_bootstrap.sh ci

      - name: Build image
        run: ./scripts/03_image_build.sh

      - name: Run Trivy image
        run: ./scripts/08_image_trivy_os.sh

      - name: Save image artifact
        run: docker image save authlab:baseline -o reports/authlab-image.tar

      - name: Upload image security reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-security-reports
          path: reports/trivy-image.json
          if-no-files-found: warn
          retention-days: 3

      - name: Upload built image
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: authlab-image
          path: reports/authlab-image.tar
          if-no-files-found: warn
          retention-days: 3

  runtime-zap:
    name: Runtime ZAP
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    needs: image-security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Bootstrap CI env
        run: ./scripts/00_env_bootstrap.sh ci

      - name: Initialize CI database
        run: ./scripts/02_app_db_init.sh ci

      - name: Download built image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: authlab-image
          path: reports

      - name: Load built image
        run: docker image load -i reports/authlab-image.tar

      - name: Bring up runtime
        run: ./scripts/04_runtime_up.sh

      - name: Run ZAP API scan
        run: ./scripts/09_dast_zap_api.sh

      - name: Tear down runtime
        if: always()
        run: ./scripts/99_down.sh

      - name: Upload runtime reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runtime-zap-reports
          path: |
            reports/zap-api.html
            reports/zap-api.json
          if-no-files-found: warn
          retention-days: 3

  summary:
    name: Security summary
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    needs: [static, image-security, runtime-zap]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Download static reports
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-reports
          path: reports

      - name: Download image security reports
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-security-reports
          path: reports

      - name: Download runtime reports
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: runtime-zap-reports
          path: reports

      - name: Generate security summary
        if: always()
        run: ./scripts/10_security_summary.sh reports reports/security-summary.md

      - name: Upload security summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-summary
          path: reports/security-summary.md
          if-no-files-found: warn
          retention-days: 3
  runtime-nightly:
    name: Runtime nightly
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Bootstrap host-side tools
        run: ./scripts/01_host_tools_bootstrap.sh tools

      - name: Bootstrap CI env
        run: ./scripts/00_env_bootstrap.sh ci

      - name: Initialize CI database
        run: ./scripts/02_app_db_init.sh ci

      - name: Run pip-audit
        run: ./scripts/06_sca_pip_audit.sh

      - name: Build image
        run: ./scripts/03_image_build.sh

      - name: Run Trivy image
        run: ./scripts/08_image_trivy_os.sh

      - name: Bring up runtime
        run: ./scripts/04_runtime_up.sh

      - name: Run ZAP API scan
        run: ./scripts/09_dast_zap_api.sh

      - name: Tear down runtime
        if: always()
        run: ./scripts/99_down.sh
      
      - name: Install jq
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate nightly security summary
        if: always()
        run: ./scripts/10_security_summary.sh reports reports/security-summary.md

      - name: Upload nightly runtime reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runtime-reports-nightly
          path: |
            reports/pip-audit-app.json
            reports/pip-audit-dev.json
            reports/trivy-image.json
            reports/zap-api.html
            reports/zap-api.json
            reports/security-summary.md
          if-no-files-found: warn
          retention-days: 3